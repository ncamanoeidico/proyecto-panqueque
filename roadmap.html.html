<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roadmap Panqueques</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 2rem; background: #fff; color: #222; }
    h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 1.5rem; }
    svg { max-width: 680px; width: 100%; }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #ddd; }
    }

    /* color ramps */
    .c-amber rect  { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text  { fill: #633806; }
    .c-teal  rect  { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal  text  { fill: #085041; }
    .c-gray  rect  { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray  text  { fill: #444441; }
    .c-coral rect  { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text  { fill: #712B13; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }

    @media (prefers-color-scheme: dark) {
      .c-amber rect  { fill: #633806; stroke: #FAC775; }
      .c-amber text  { fill: #FAEEDA; }
      .c-teal  rect  { fill: #085041; stroke: #9FE1CB; }
      .c-teal  text  { fill: #E1F5EE; }
      .c-gray  rect  { fill: #444441; stroke: #B4B2A9; }
      .c-gray  text  { fill: #F1EFE8; }
      .c-coral rect  { fill: #712B13; stroke: #F5C4B3; }
      .c-coral text  { fill: #FAECE7; }
      .c-purple rect { fill: #3C3489; stroke: #CECBF6; }
      .c-purple text { fill: #EEEDFE; }
    }

    .arr { fill: none; stroke: #888; stroke-width: 1.2; }
    text.th { font-size: 14px; font-weight: 500; }
    text.ts { font-size: 12px; font-weight: 400; fill: #666; }

    @media (prefers-color-scheme: dark) {
      text.ts { fill: #aaa; }
      .arr { stroke: #666; }
    }
  </style>
</head>
<body>
  <h1>🥞 Roadmap — Cómo hacer panqueques</h1>
  <svg viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Reunir ingredientes -->
    <g class="c-amber">
      <rect x="240" y="20" width="200" height="44" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Reunir ingredientes</text>
    </g>

    <!-- Sub-ingredientes -->
    <g class="c-amber">
      <rect x="40" y="100" width="130" height="44" rx="8" stroke-width="0.5"/>
      <text class="th" x="105" y="118" text-anchor="middle" dominant-baseline="central">Harina</text>
      <text class="ts" x="105" y="132" text-anchor="middle" dominant-baseline="central">1 taza</text>
    </g>
    <g class="c-amber">
      <rect x="190" y="100" width="130" height="44" rx="8" stroke-width="0.5"/>
      <text class="th" x="255" y="118" text-anchor="middle" dominant-baseline="central">Leche</text>
      <text class="ts" x="255" y="132" text-anchor="middle" dominant-baseline="central">1 taza</text>
    </g>
    <g class="c-amber">
      <rect x="340" y="100" width="130" height="44" rx="8" stroke-width="0.5"/>
      <text class="th" x="405" y="118" text-anchor="middle" dominant-baseline="central">Huevos</text>
      <text class="ts" x="405" y="132" text-anchor="middle" dominant-baseline="central">2 unidades</text>
    </g>
    <g class="c-amber">
      <rect x="490" y="100" width="150" height="44" rx="8" stroke-width="0.5"/>
      <text class="th" x="565" y="118" text-anchor="middle" dominant-baseline="central">Manteca + sal</text>
      <text class="ts" x="565" y="132" text-anchor="middle" dominant-baseline="central">pizca + 1 cdita</text>
    </g>

    <!-- Flechas ingredientes -->
    <line x1="340" y1="64" x2="105" y2="100" class="arr" marker-end="url(#arrow)" opacity="0.5"/>
    <line x1="340" y1="64" x2="255" y2="100" class="arr" marker-end="url(#arrow)" opacity="0.5"/>
    <line x1="340" y1="64" x2="405" y2="100" class="arr" marker-end="url(#arrow)" opacity="0.5"/>
    <line x1="340" y1="64" x2="565" y2="100" class="arr" marker-end="url(#arrow)" opacity="0.5"/>

    <line x1="340" y1="144" x2="340" y2="178" class="arr" marker-end="url(#arrow)"/>
    <text class="ts" x="380" y="165" dominant-baseline="central">combinar</text>

    <!-- Mezclar -->
    <g class="c-teal">
      <rect x="220" y="178" width="240" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="198" text-anchor="middle" dominant-baseline="central">Mezclar la masa</text>
      <text class="ts" x="340" y="216" text-anchor="middle" dominant-baseline="central">Batir hasta integrar sin grumos</text>
    </g>

    <line x1="340" y1="234" x2="340" y2="268" class="arr" marker-end="url(#arrow)"/>

    <!-- Reposar -->
    <g class="c-gray">
      <rect x="220" y="268" width="240" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="288" text-anchor="middle" dominant-baseline="central">Reposar la mezcla</text>
      <text class="ts" x="340" y="306" text-anchor="middle" dominant-baseline="central">Al menos 10 minutos</text>
    </g>

    <line x1="340" y1="324" x2="340" y2="358" class="arr" marker-end="url(#arrow)"/>

    <!-- Calentar sartén -->
    <g class="c-coral">
      <rect x="220" y="358" width="240" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="378" text-anchor="middle" dominant-baseline="central">Calentar la sartén</text>
      <text class="ts" x="340" y="396" text-anchor="middle" dominant-baseline="central">Fuego medio, con manteca</text>
    </g>

    <line x1="340" y1="414" x2="340" y2="448" class="arr" marker-end="url(#arrow)"/>

    <!-- Cocinar -->
    <g class="c-coral">
      <rect x="200" y="448" width="280" height="68" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="470" text-anchor="middle" dominant-baseline="central">Cocinar cada panqueque</text>
      <text class="ts" x="340" y="488" text-anchor="middle" dominant-baseline="central">Verter cucharón · burbujas = dar vuelta</text>
      <text class="ts" x="340" y="504" text-anchor="middle" dominant-baseline="central">~1 min por lado</text>
    </g>

    <path d="M480 482 C560 482, 580 560, 520 570 L340 570" fill="none" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.5" marker-end="url(#arrow)"/>
    <text class="ts" x="545" y="545" text-anchor="middle">repetir</text>

    <line x1="340" y1="516" x2="340" y2="580" class="arr" marker-end="url(#arrow)"/>

    <!-- Servir -->
    <g class="c-purple">
      <rect x="200" y="580" width="280" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="600" text-anchor="middle" dominant-baseline="central">Servir</text>
      <text class="ts" x="340" y="618" text-anchor="middle" dominant-baseline="central">Con dulce de leche, mermelada o miel</text>
    </g>

    <text x="340" y="680" text-anchor="middle" font-size="20">🥞</text>
  </svg>
</body>
</html>
